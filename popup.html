<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element to Webflow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f10;
      color: #fafafa;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2e;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4353ff, #a259ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2;
      fill: none;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 11px;
      color: #71717a;
      margin-top: 2px;
    }

    .status-section {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 12px;
      color: #a1a1aa;
    }

    .status-value {
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #71717a;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .status-dot.selecting {
      background: #f59e0b;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4353ff, #6366f1);
      color: white;
      margin-bottom: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(67, 83, 255, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: #1f1f23;
      color: #a1a1aa;
      border: 1px solid #2a2a2e;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #2a2a2e;
      color: #fafafa;
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-success {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .btn-page {
      background: #1f1f23;
      color: #a259ff;
      border: 1px solid rgba(162, 89, 255, 0.3);
      margin-bottom: 8px;
    }

    .btn-page:hover:not(:disabled) {
      background: rgba(162, 89, 255, 0.1);
      color: #b47ffe;
      border-color: rgba(162, 89, 255, 0.5);
    }

    .btn-page:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .selected-info {
      background: #18181b;
      border: 1px solid #2a2a2e;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .selected-info.visible {
      display: block;
    }

    .selected-info h3 {
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .element-preview {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: #a1a1aa;
      background: #0f0f10;
      padding: 8px 10px;
      border-radius: 6px;
      word-break: break-all;
      line-height: 1.5;
    }

    .element-preview .tag {
      color: #ff79c6;
    }

    .element-preview .class {
      color: #50fa7b;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .stat {
      font-size: 11px;
      color: #71717a;
    }

    .stat span {
      color: #fafafa;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: #2a2a2e;
      margin: 12px 0;
    }

    .limitations {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a2e;
    }

    .limitations h4 {
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      margin-bottom: 6px;
    }

    .limitations ul {
      list-style: none;
      font-size: 10px;
      color: #52525b;
      line-height: 1.6;
    }

    .limitations li {
      padding-left: 12px;
      position: relative;
    }

    .limitations li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #52525b;
    }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: #22c55e;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M12 8v8m-4-4h8"/>
      </svg>
    </div>
    <div>
      <h1>Element to Webflow</h1>
      <p class="subtitle">Copy any element → Paste in Webflow</p>
    </div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="status-label">Mode</span>
      <span class="status-value">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready</span>
      </span>
    </div>
  </div>

  <button class="btn btn-primary" id="selectBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3v18m-9-9h18"/>
    </svg>
    Select Element
  </button>

  <button class="btn btn-page" id="copyPageBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    Copy Full Page
  </button>

  <div class="selected-info" id="selectedInfo">
    <h3>Selected Element</h3>
    <div class="element-preview" id="elementPreview"></div>
    <div class="stats">
      <span class="stat">Children: <span id="childCount">0</span></span>
      <span class="stat">Styles: <span id="styleCount">0</span></span>
    </div>
  </div>

  <button class="btn btn-secondary" id="copyBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    Copy for Webflow
  </button>

  <div class="limitations">
    <h4>Limitations</h4>
    <ul>
      <li>Images use original URLs</li>
      <li>Custom fonts may fallback</li>
      <li>JS interactions become static</li>
    </ul>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
